<!DOCTYPE html>
<html lang="zh-CN" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>河北三支一扶 · 人文历史备考</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ===== CSS 变量：亮色 & 暗色主题 ===== */
    :root {
      --crimson: #C23B22; --crimson-light: #E85D4A; --crimson-dark: #8B1A1A;
      --gold: #C5A55A; --gold-light: #E0C878;
      --ink: #2C2C2C; --ink-light: #4A4A4A;
      --paper: #FFF8F0; --paper-dark: #F5EDE0;
      --bg-primary: #FFFAF5; --bg-secondary: #FFF5EC; --bg-card: #FFFFFF;
      --text-primary: #2C2C2C; --text-secondary: #5A5A5A; --text-muted: #999999;
      --border: #E8DDD0; --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-hover: 0 6px 24px rgba(0,0,0,0.12);
      --accent: var(--crimson); --accent-light: #FDE8E4;
      --correct: #2D8B57; --wrong: #C23B22;
      --cat-wenxue: #8B5CF6; --cat-lishi: #3B82F6; --cat-zhexue: #D97706;
      --cat-renwu: #10B981; --cat-wenhua: #EC4899; --cat-shijie: #6366F1;
      --cat-hebei: #DC2626; --cat-sanzhi: #0891B2;
      --timeline-line: #D4C5B0;
      --glass-bg: rgba(255,255,255,0.7); --glass-border: rgba(255,255,255,0.3);
    }
    .dark {
      --bg-primary: #1A1410; --bg-secondary: #2A221C; --bg-card: #2A221C;
      --text-primary: #F0E8E0; --text-secondary: #C0B0A0; --text-muted: #807060;
      --border: #3A3028; --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --shadow-hover: 0 6px 24px rgba(0,0,0,0.4);
      --accent-light: #3A1A1A;
      --glass-bg: rgba(42,34,28,0.8); --glass-border: rgba(60,50,40,0.3);
      --timeline-line: #4A3A2A;
    }
    /* ===== 全局 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      min-height: 100vh; transition: background 0.3s, color 0.3s;
    }
    /* 背景纹理 */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: -1;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(194,59,34,0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(197,165,90,0.04) 0%, transparent 50%);
    }
    .dark body::before {
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(194,59,34,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(197,165,90,0.06) 0%, transparent 50%);
    }
    /* ===== 滚动条 ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    /* ===== 毛玻璃 ===== */
    .glass {
      background: var(--glass-bg); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
    }
    /* ===== 卡片 ===== */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { box-shadow: var(--shadow-hover); }
    /* ===== 中国风装饰 ===== */
    .cn-divider {
      height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1rem 0; border: none;
    }
    .cn-ornament {
      display: inline-flex; align-items: center; gap: 8px; color: var(--gold);
      font-size: 0.8rem;
    }
    .cn-ornament::before, .cn-ornament::after {
      content: '◆'; font-size: 0.5rem; opacity: 0.5;
    }
    /* ===== 标签页导航 ===== */
    .tab-btn {
      padding: 10px 20px; border: none; background: transparent;
      color: var(--text-muted); cursor: pointer; font-size: 0.95rem;
      border-bottom: 2px solid transparent; transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text-secondary); }
    .tab-btn.active {
      color: var(--accent); border-bottom-color: var(--accent); font-weight: 600;
    }
    /* ===== 闪卡 3D 翻转 ===== */
    .flashcard-container { perspective: 1000px; }
    .flashcard-inner {
      position: relative; width: 100%; height: 280px;
      transition: transform 0.5s; transform-style: preserve-3d; cursor: pointer;
    }
    .flashcard-inner.flipped { transform: rotateY(180deg); }
    .flashcard-front, .flashcard-back {
      position: absolute; inset: 0; backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 16px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
      background: var(--bg-card); border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .flashcard-back { transform: rotateY(180deg); }
    /* ===== 刷题选项 ===== */
    .quiz-option {
      display: block; width: 100%; padding: 14px 18px; margin: 8px 0;
      border: 2px solid var(--border); border-radius: 10px;
      background: var(--bg-card); cursor: pointer; text-align: left;
      font-size: 0.95rem; transition: all 0.2s;
    }
    .quiz-option:hover { border-color: var(--accent); background: var(--accent-light); }
    .quiz-option.selected { border-color: var(--accent); background: var(--accent-light); }
    .quiz-option.correct { border-color: var(--correct); background: #E8F5E9; color: var(--correct); }
    .quiz-option.wrong { border-color: var(--wrong); background: #FFEBEE; color: var(--wrong); }
    .dark .quiz-option.correct { background: #1B3A1B; }
    .dark .quiz-option.wrong { background: #3A1B1B; }
    /* ===== 时间轴 ===== */
    .tl-container {
      display: flex; gap: 0; overflow-x: auto; padding: 20px 0;
      position: relative;
    }
    .tl-container::before {
      content: ''; position: absolute; top: 50%; left: 0; right: 0;
      height: 3px; background: var(--timeline-line); transform: translateY(-50%);
      z-index: 0;
    }
    .tl-node {
      flex-shrink: 0; width: 120px; text-align: center; cursor: pointer;
      position: relative; z-index: 1; padding-top: 10px;
      transition: transform 0.2s;
    }
    .tl-node:hover { transform: translateY(-4px); }
    .tl-dot {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--accent); margin: 0 auto 8px; border: 3px solid var(--bg-primary);
      box-shadow: 0 0 0 2px var(--accent);
    }
    .tl-node.hebei .tl-dot { background: var(--cat-hebei); box-shadow: 0 0 0 2px var(--cat-hebei); }
        /* ===== 三标式时间轴 ===== */
.tl-axis { position: relative; padding: 0; }
/* 朝代标尺（外层） */
.tl-dynasty-bar {
  display: flex; overflow-x: auto; gap: 4px; padding: 8px 4px; margin-bottom: 0;
  position: sticky; top: 0; z-index: 5;
  background: var(--bg-primary);
  border-bottom: 2px solid var(--border);
}
.tl-dynasty-tag {
  flex-shrink: 0; padding: 4px 10px; border-radius: 6px; cursor: pointer;
  font-size: 0.7rem; font-weight: 600; text-align: center;
  background: var(--bg-card); border: 1px solid var(--border);
  transition: all 0.2s; white-space: nowrap;
}
.tl-dynasty-tag:hover { border-color: var(--accent); }
.tl-dynasty-tag.active { background: var(--accent); color: white; border-color: var(--accent); }
.tl-dynasty-tag.hebei { border-left: 3px solid var(--cat-hebei); }
/* 事件列表（中+内层） */
.tl-event-list { padding: 4px 0; }
.tl-event-group { margin-bottom: 0; }
.tl-event-group-header {
  padding: 10px 8px; margin: 0 -8px; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-secondary); margin-bottom: 8px;
  transition: background 0.2s; position: sticky; top: 48px; z-index: 4;
}
.tl-event-group-header:hover { filter: brightness(0.97); }
.tl-eg-dynasty { font-size: 1rem; font-weight: 700; color: var(--accent); }
.tl-eg-years { font-size: 0.7rem; color: var(--text-muted); }
.tl-eg-badge { font-size: 0.6rem; padding: 1px 6px; border-radius: 4px; background: var(--accent-light); color: var(--accent); }
/* 单条事件（三标式） */
.tl-event {
  position: relative; padding: 8px 8px 8px 24px; margin-bottom: 2px;
  border-left: 2px solid var(--border);
  margin-left: 12px; cursor: pointer; transition: all 0.2s;
  border-radius: 0 6px 6px 0;
}
.tl-event:hover { background: var(--bg-secondary); border-left-color: var(--accent); }
.tl-event::before {
  content: ''; position: absolute; left: -7px; top: 14px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--bg-card);
}
.tl-event.hebei::before { background: var(--cat-hebei); }
.tl-event-year { font-size: 0.65rem; font-weight: 700; color: var(--accent); display: inline-block; padding: 1px 6px; border-radius: 3px; background: var(--accent-light); }
.tl-event-title { font-size: 0.85rem; font-weight: 600; margin: 2px 0; }
.tl-event-detail { font-size: 0.75rem; line-height: 1.5; color: var(--text-secondary); display: none; margin-top: 4px; }
.tl-event.open .tl-event-detail { display: block; }
.tl-event.open .tl-event-summary { display: none; }
.tl-event-summary { font-size: 0.7rem; color: var(--gold); font-style: italic; margin-top: 1px; }
.tl-event-significance { font-size: 0.7rem; line-height: 1.5; color: var(--gold); padding: 6px 8px; border-radius: 4px; background: rgba(197,165,90,0.08); margin-top: 4px; }
/* ===== 进度条 ===== */
    .progress-bar {
      height: 8px; border-radius: 4px; background: var(--border); overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 4px; transition: width 0.6s ease;
      background: linear-gradient(90deg, var(--crimson), var(--gold));
    }
    /* ===== 动效 ===== */
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .pulse { animation: pulse 0.5s ease; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    .shake { animation: shake 0.3s ease; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
    /* ===== 徽标 ===== */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 500;
    }
    .badge-hebei { background: #FEE2E2; color: #DC2626; }
    .badge-high { background: #FEF3C7; color: #D97706; }
    .badge-medium { background: #DBEAFE; color: #2563EB; }
    .badge-low { background: #F3F4F6; color: #6B7280; }
    .dark .badge-hebei { background: #3A1A1A; }
    .dark .badge-high { background: #3A2A1A; }
    .dark .badge-medium { background: #1A2A3A; }
    .dark .badge-low { background: #2A2A2A; }
    /* ===== 移动端响应式 ===== */
    /* 安全区域适配（iPhone刘海屏） */
    @supports (padding-top: env(safe-area-inset-top)) {
      .mobile-nav { padding-bottom: env(safe-area-inset-bottom); }
      header.glass { padding-top: env(safe-area-inset-top); }
    }
    /* 移动端：<768px */
    @media (max-width: 767px) {
      body { padding-bottom: 70px; } /* 底部导航空间 */
      .tab-btn { padding: 12px 8px; font-size: 0.8rem; min-height: 48px; }
      .flashcard-inner { height: 260px; }
      .flashcard-front, .flashcard-back { padding: 1.2rem; }
      .flashcard-front .text-lg { font-size: 1rem !important; }
      .tl-node { width: 80px; min-height: 60px; }
      .tl-node .text-sm { font-size: 0.7rem !important; }
      .desktop-nav { display: none; }
      .mobile-nav { display: flex !important; }
      h1 { font-size: 1.05rem !important; }
      .card { border-radius: 10px; }
      .quiz-option { padding: 12px 14px; font-size: 0.88rem; margin: 6px 0; min-height: 44px; }
      .badge { font-size: 0.65rem; padding: 2px 8px; }
      header .text-lg { font-size: 1rem !important; }
      #streakDisplay, #accuracyDisplay { font-size: 0.65rem !important; }
      .grid-cols-2 { gap: 0.5rem; }
      .p-5 { padding: 1rem !important; }
      .p-6 { padding: 1.2rem !important; }
      .p-4 { padding: 0.8rem !important; }
      .px-4 { padding-left: 0.8rem !important; padding-right: 0.8rem !important; }
      .py-6 { padding-top: 0.8rem !important; padding-bottom: 0.8rem !important; }
      .text-2xl { font-size: 1.3rem !important; }
      .text-3xl { font-size: 1.8rem !important; }
      .gap-3 { gap: 0.5rem !important; }
      .max-w-2xl { max-width: 100% !important; }
      .max-w-lg { max-width: 100% !important; }
      /* 移动端时间轴专用：纵向布局 */
      .tl-container {
        flex-direction: column; gap: 0; overflow-x: hidden; padding: 10px 0;
      }
      .tl-container::before {
        top: 0; bottom: 0; left: 30px; right: auto; height: auto; width: 3px;
        transform: none;
      }
      .tl-node {
        width: 100%; text-align: left; display: flex; align-items: center;
        gap: 12px; padding: 10px 0 10px 20px; flex-shrink: 0;
      }
      .tl-node .tl-dot { margin: 0; flex-shrink: 0; }
      .tl-node > div:not(.tl-dot) { display: inline; }
      .mobile-bottom-spacer { display: block; height: 80px; }
    }
    @media (min-width: 768px) {
      .mobile-nav { display: none !important; }
      .mobile-bottom-spacer { display: none; }
    }
    /* 平板 */
    @media (min-width: 768px) and (max-width: 1023px) {
      .grid-cols-2.md\:grid-cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    /* 桌面大屏 */
    @media (min-width: 1280px) {
      .max-w-5xl { max-width: 1000px; }
    }
    /* ===== 触控优化 ===== */
    .touch-ripple {
      position: relative; overflow: hidden;
    }
    .touch-ripple::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(194,59,34,0.15) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .touch-ripple:active::after { opacity: 1; }
    /* 移动端滑动指示器 */
    .swipe-indicator {
      display: none; text-align: center; font-size: 0.7rem;
      color: var(--text-muted); padding: 4px 0;
    }
    @media (max-width: 767px) {
      .swipe-indicator { display: block; }
    }
    /* ===== 工具 ===== */
    .hebei-highlight {
      background: linear-gradient(135deg, #FEE2E2, #FFF5F5);
      border-left: 3px solid var(--cat-hebei);
    }
    .dark .hebei-highlight {
      background: linear-gradient(135deg, #2A1A1A, #1A1410);
    }
    .text-hebei { color: var(--cat-hebei); }
    .clickable { cursor: pointer; }
    .no-select { user-select: none; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            crimson: { DEFAULT: '#C23B22', light: '#E85D4A', dark: '#8B1A1A' },
            gold: { DEFAULT: '#C5A55A', light: '#E0C878' },
          }
        }
      }
    }
  </script>
</head>
<body>

<!-- ============================== HEADER ============================== -->
<header class="glass sticky top-0 z-50 border-b" style="border-color:var(--border);">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span style="font-size:1.6rem;">📚</span>
      <div>
        <h1 class="font-bold text-lg" style="color:var(--crimson);">河北三支一扶 · 人文历史备考</h1>
        <div class="flex items-center gap-3 text-xs" style="color:var(--text-muted);">
          <span id="streakDisplay">🔥 学习 0 天</span>
          <span id="accuracyDisplay">🎯 正确率 --</span>
        </div>
      </div>
    </div>
    <button id="darkToggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/5 transition" title="切换暗色模式">
      <span id="darkIcon">🌙</span>
    </button>
  </div>
</header>

<!-- ============================== NAVIGATION ============================== -->
<nav class="desktop-nav border-b glass sticky z-40" style="top:60px;border-color:var(--border);">
  <div class="max-w-5xl mx-auto px-4 flex overflow-x-auto no-select" id="tabNav">
    <button class="tab-btn active" data-tab="timeline">🏛️ 时间轴</button>
    <button class="tab-btn" data-tab="quiz">✍️ 刷题</button>
    <button class="tab-btn" data-tab="flashcards">🃏 闪卡</button>
    <button class="tab-btn" data-tab="dashboard">📊 总览</button>
  </div>
</nav>

<!-- ============================== MAIN CONTENT ============================== -->
<main id="mainContent" class="max-w-5xl mx-auto px-4 py-6 fade-in">
  <!-- 初始由 JS 渲染 -->
  <div id="app"></div>
</main>

<!-- ============================== MOBILE BOTTOM SPACER ============================== -->
<div class="mobile-bottom-spacer"></div>

<!-- ============================== MOBILE NAV ============================== -->
<nav class="mobile-nav fixed bottom-0 left-0 right-0 z-50 glass border-t" style="border-color:var(--border);">
  <div class="flex justify-around py-2" id="mobileTabNav">
    <button class="tab-btn active text-xs" data-tab="timeline">🏛️<br><span style="font-size:0.6rem;">时间轴</span></button>
    <button class="tab-btn text-xs" data-tab="quiz">✍️<br><span style="font-size:0.6rem;">刷题</span></button>
    <button class="tab-btn text-xs" data-tab="flashcards">🃏<br><span style="font-size:0.6rem;">闪卡</span></button>
    <button class="tab-btn text-xs" data-tab="dashboard">📊<br><span style="font-size:0.6rem;">总览</span></button>
  </div>
</nav>

<script>
/* ===================================================================
   河北三支一扶 · 人文历史备考工具
   所有数据集中在本脚本顶部，修改数据无需动渲染逻辑
   每个字段都标注了中文说明，方便理解
   =================================================================== */

// ======================== 数据部分 ========================

// ----- 1. 朝代数据 (dynasties) -----
//  用于时间轴可视化
const dynasties = [
  {
    id: 'xia', name: '夏朝',
    startYear: -2070, endYear: -1600,
    summary: '中国历史上第一个世袭制王朝，由大禹建立。确立了王位世袭制，标志着原始社会的结束和阶级社会的开始。',
    capital: '阳城（今河南登封）',
    keyFigures: [
      { name: '禹', description: '治水英雄，夏朝建立者', contribution: '开创世袭制' },
      { name: '启', description: '禹之子，开创世袭制', contribution: '世袭制确立' },
      { name: '桀', description: '夏朝末代君主，暴君', contribution: '暴政致亡国' }
    ],
    keyEvents: [
      { year: -2070, event: '禹建立夏朝', details: '禹因治水有功受舜禅让成为部落联盟首领，死后其子启继承王位，开创世袭制。夏朝定都阳城（今河南登封），建立国家机构，制定刑法，修筑监狱。', significance: '中国历史上第一个世袭制王朝的建立，标志着中国原始社会的终结和阶级社会的开端' },
      { year: -1600, event: '商汤灭夏，夏朝灭亡', details: '夏朝末代君主桀暴虐无道，商部落首领汤起兵伐夏，在鸣条之战中击败夏军，夏朝灭亡。', significance: '中国历史上第一次王朝更替，"汤武革命"的开端' }
    ]
  },
  {
    id: 'shang', name: '商朝',
    startYear: -1600, endYear: -1046,
    summary: '中国历史上第二个朝代，也是第一个有同时期文字记载的王朝。甲骨文是中国最早的成熟文字体系。',
    capital: '殷（今河南安阳）',
    keyFigures: [
      { name: '汤', description: '商朝开国君主', contribution: '灭夏建商' },
      { name: '盘庚', description: '迁都至殷', contribution: '稳定商朝统治' },
      { name: '纣王', description: '末代君主，暴君', contribution: '暴政致亡国' }

  { id: 'q_013', question: '科举制度创立于哪个朝代？', options: ['汉朝', '隋朝', '唐朝', '宋朝'], correctIndex: 1, explanation: '科举制度始于隋朝，隋炀帝时正式设立进士科，唐朝进一步完善。', category: '文化', dynasty: '隋唐', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_014', question: '"贞观之治"是哪位皇帝在位时期的盛世？', options: ['唐高祖', '唐太宗', '唐玄宗', '武则天'], correctIndex: 1, explanation: '唐太宗李世民在位期间（627-649年）政治清明、社会稳定，史称"贞观之治"。', category: '历史事件', dynasty: '唐朝', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_015', question: '被称为"诗仙"的唐代诗人是？', options: ['杜甫', '白居易', '王维', '李白'], correctIndex: 3, explanation: '李白诗歌充满浪漫主义色彩，被后世尊称为"诗仙"。', category: '文学', dynasty: '唐朝', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_016', question: '被称为"诗圣"的唐代诗人是？', options: ['李白', '杜甫', '王维', '白居易'], correctIndex: 1, explanation: '杜甫的诗歌深刻反映了社会现实，被尊称为"诗圣"。', category: '文学', dynasty: '唐朝', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_017', question: '唐朝由盛转衰的转折点是？', options: ['安史之乱', '黄巢起义', '藩镇割据', '宦官专权'], correctIndex: 0, explanation: '755年爆发的安史之乱是唐朝由盛转衰的转折点，持续八年，对社会经济造成严重破坏。', category: '历史事件', dynasty: '唐朝', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_018', question: '世界上现存最古老的单孔石拱桥赵州桥位于河北哪里？', options: ['石家庄赵县', '保定定州', '邯郸', '邢台'], correctIndex: 0, explanation: '赵州桥（安济桥）位于石家庄赵县，隋代李春设计建造，是世界桥梁史上的奇迹。', category: '河北特色', dynasty: '隋朝', difficulty: 1, examFrequency: 'medium', isHebeiRelated: true, examType: 'single' },

  { id: 'q_020', question: '"唐宋八大家"中属于宋代的是？下列哪位不是宋代人？', options: ['韩愈', '欧阳修', '苏轼', '王安石'], correctIndex: 0, explanation: '韩愈是唐代人，不是宋代的。唐宋八大家中宋代有六位：欧阳修、苏洵、苏轼、苏辙、王安石、曾巩。', category: '文学', dynasty: '宋朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_021', question: '元曲四大家不包括以下哪一位？', options: ['关汉卿', '马致远', '王实甫', '白朴'], correctIndex: 2, explanation: '元曲四大家是关汉卿、马致远、白朴、郑光祖。王实甫虽也是元曲名家（《西厢记》），但不在四大家之列。', category: '文学', dynasty: '元朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_022', question: '中国历史上版图最大的王朝是？', options: ['唐朝', '元朝', '明朝', '清朝'], correctIndex: 1, explanation: '元朝的版图是中国历史上最大的，横跨欧亚大陆。', category: '历史事件', dynasty: '元朝', difficulty: 1, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },

  { id: 'q_024', question: '郑和下西洋最早是在哪一年？', options: ['1405年', '1410年', '1420年', '1430年'], correctIndex: 0, explanation: '1405年，郑和率领船队首次下西洋，比哥伦布发现美洲早近90年。', category: '历史事件', dynasty: '明朝', difficulty: 1, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_025', question: '《本草纲目》的作者是？', options: ['华佗', '张仲景', '孙思邈', '李时珍'], correctIndex: 3, explanation: '李时珍历时27年编写《本草纲目》，收录药物1892种，是世界医药学的重要文献。', category: '文化', dynasty: '明朝', difficulty: 1, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },

  // --- 近代 ---
  { id: 'q_026', question: '中国近代史上第一个不平等条约是？', options: ['《北京条约》', '《南京条约》', '《马关条约》', '《辛丑条约》'], correctIndex: 1, explanation: '1842年签订的中英《南京条约》是中国近代第一个不平等条约，标志中国开始沦为半殖民地半封建社会。', category: '历史事件', dynasty: '近代', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_027', question: '太平天国运动的领导人是？', options: ['洪秀全', '曾国藩', '李鸿章', '左宗棠'], correctIndex: 0, explanation: '洪秀全于1851年发动金田起义，建立太平天国，定都天京。', category: '历史事件', dynasty: '近代', difficulty: 1, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_028', question: '洋务运动的口号是？', options: ['师夷长技以制夷', '自强、求富', '变法图强', '民主共和'], correctIndex: 1, explanation: '洋务派以"自强"（前期创办军事工业）和"求富"（后期创办民用工业）为口号。', category: '历史事件', dynasty: '近代', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_029', question: '甲午战争中北洋水师全军覆没是在哪场战役？', options: ['丰岛海战', '黄海海战', '威海卫战役', '大东沟海战'], correctIndex: 2, explanation: '1895年威海卫战役中，北洋水师全军覆没，标志着洋务运动的失败。', category: '历史事件', dynasty: '近代', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_030', question: '戊戌变法持续了多少天？', options: ['100天', '103天', '108天', '200天'], correctIndex: 1, explanation: '戊戌变法从1898年6月11日到9月21日，共103天，故又称"百日维新"。', category: '历史事件', dynasty: '近代', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_031', question: '辛亥革命的指导思想是？', options: ['三民主义', '马克思主义', '自由主义', '改良主义'], correctIndex: 0, explanation: '孙中山提出了民族、民权、民生三大主义，即三民主义，是辛亥革命的指导思想。', category: '历史事件', dynasty: '近代', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_032', question: '新文化运动提倡的两面旗帜是？', options: ['自由与平等', '民主与科学', '爱国与进步', '革命与建设'], correctIndex: 1, explanation: '新文化运动高举"民主"和"科学"两面大旗，反对封建专制和迷信愚昧。', category: '历史事件', dynasty: '近代', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_033', question: '五四运动爆发的直接原因是？', options: ['北洋军阀统治黑暗', '巴黎和会中国外交失败', '俄国十月革命影响', '日本提出二十一条'], correctIndex: 1, explanation: '1919年巴黎和会拒绝中国收回山东主权的要求，引发五四爱国运动。', category: '历史事件', dynasty: '近代', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_034', question: '中国共产党成立的时间是？', options: ['1920年7月', '1921年7月', '1922年7月', '1923年7月'], correctIndex: 1, explanation: '1921年7月23日中共一大在上海召开，标志着中国共产党正式成立。', category: '历史事件', dynasty: '近代', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_035', question: '全面抗日战争的起点是？', options: ['九一八事变', '七七事变', '华北事变', '西安事变'], correctIndex: 1, explanation: '1937年7月7日卢沟桥事变（七七事变）标志着全面抗日战争的爆发。', category: '历史事件', dynasty: '近代', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_036', question: '解放战争中的三大战役不包括？', options: ['辽沈战役', '淮海战役', '平津战役', '渡江战役'], correctIndex: 3, explanation: '三大战役是指辽沈战役、淮海战役和平津战役，渡江战役是三大战役后的重大战役。', category: '历史事件', dynasty: '近代', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_037', question: '新中国成立于哪一年？', options: ['1948年', '1949年', '1950年', '1951年'], correctIndex: 1, explanation: '1949年10月1日，毛泽东在天安门城楼宣布中华人民共和国成立。', category: '历史事件', dynasty: '当代', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },

  { id: 'q_038', question: '改革开放是哪一年开始的？', options: ['1976年', '1977年', '1978年', '1979年'], correctIndex: 2, explanation: '1978年十一届三中全会召开，作出改革开放的伟大决策，开启了社会主义现代化建设新时期。', category: '历史事件', dynasty: '当代', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_039', question: '"一国两制"构想最早是为解决哪个问题提出的？', options: ['香港问题', '澳门问题', '台湾问题', '西藏问题'], correctIndex: 2, explanation: '"一国两制"是邓小平为解决台湾问题提出的，后成功运用于香港和澳门的回归。', category: '历史事件', dynasty: '当代', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },

  { id: 'q_041', question: '"完璧归赵""负荆请罪"等成语与河北哪座城市有关？', options: ['石家庄', '邯郸', '保定', '邢台'], correctIndex: 1, explanation: '邯郸是战国时期赵国都城，与邯郸相关的成语达1500余条，被称为"成语之乡"。', category: '河北特色', dynasty: '先秦', difficulty: 1, examFrequency: 'high', isHebeiRelated: true, examType: 'single' },
  { id: 'q_042', question: '承德避暑山庄始建于哪个皇帝时期？', options: ['顺治', '康熙', '雍正', '乾隆'], correctIndex: 1, explanation: '承德避暑山庄始建于1703年康熙四十二年，历经康熙、雍正、乾隆三代建成。', category: '河北特色', dynasty: '清朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: true, examType: 'single' },
  { id: 'q_043', question: '有"天下第一关"之称的是？', options: ['嘉峪关', '山海关', '居庸关', '潼关'], correctIndex: 1, explanation: '山海关位于河北秦皇岛，是明长城的东部起点，被称为"天下第一关"。', category: '河北特色', dynasty: '明清', difficulty: 1, examFrequency: 'medium', isHebeiRelated: true, examType: 'single' },

  { id: 'q_045', question: '中国最早的马克思主义者、河北乐亭人是？', options: ['陈独秀', '李大钊', '鲁迅', '胡适'], correctIndex: 1, explanation: '李大钊（1889-1927），河北乐亭人，是中国最早的马克思主义者，中国共产党的主要创始人之一。', category: '河北特色', dynasty: '近代', difficulty: 1, examFrequency: 'high', isHebeiRelated: true, examType: 'single' },
  { id: 'q_046', question: '雄安新区涉及哪三个县？', options: ['雄县、安新、容城', '雄县、安新、高阳', '徐水、容城、安新', '雄县、容城、定兴'], correctIndex: 0, explanation: '雄安新区规划范围包括河北省雄县、容城县、安新县三县及周边部分区域。', category: '河北特色', dynasty: '当代', difficulty: 2, examFrequency: 'high', isHebeiRelated: true, examType: 'single' },
  { id: 'q_047', question: '三国名将赵云是河北哪里人？', options: ['保定定州', '石家庄正定', '邯郸', '沧州'], correctIndex: 1, explanation: '赵云（常山赵子龙）是常山真定人（今石家庄正定）。', category: '河北特色', dynasty: '三国', difficulty: 2, examFrequency: 'medium', isHebeiRelated: true, examType: 'single' },

  { id: 'q_050', question: '乡村振兴战略的总要求不包括以下哪项？', options: ['产业兴旺', '生态宜居', '共同富裕', '治理有效'], correctIndex: 2, explanation: '乡村振兴总要求是产业兴旺、生态宜居、乡风文明、治理有效、生活富裕，不包括"共同富裕"。', category: '三支政策', dynasty: '当代', difficulty: 1, examFrequency: 'high', isHebeiRelated: true, examType: 'single' },

  { id: 'q_051', question: '老子是哪家学派的创始人？', options: ['儒家', '道家', '法家', '墨家'], correctIndex: 1, explanation: '老子是道家学派创始人，主张"道法自然""无为而治"，著有《道德经》。', category: '哲学', dynasty: '先秦', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },

  { id: 'q_053', question: '"兼爱""非攻"是哪家学派的主张？', options: ['儒家', '道家', '墨家', '法家'], correctIndex: 2, explanation: '墨家创始人墨子主张"兼爱"（无差别爱所有人）和"非攻"（反对不义战争）。', category: '哲学', dynasty: '先秦', difficulty: 1, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },

  { id: 'q_057', question: '下列不属于"唐代"的诗人是？', options: ['王勃', '骆宾王', '王安石', '杜牧'], correctIndex: 2, explanation: '王安石是宋代文学家、政治家，不属于唐代。王勃、骆宾王是初唐诗人，杜牧是晚唐诗人。', category: '文学', dynasty: '唐朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_058', question: '"唐宋八大家"中，属于唐代的是？（多选）', options: ['韩愈、柳宗元', '韩愈、柳宗元、欧阳修', '韩愈、欧阳修、苏轼', '柳宗元、苏轼、苏辙'], correctIndex: 0, explanation: '唐宋八大家中唐代仅韩愈和柳宗元两人，其余六位都是宋代人。', category: '文学', dynasty: '唐朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_059', question: '下列事件发生的先后顺序正确的是？', options: ['鸦片战争→太平天国→洋务运动→戊戌变法', '太平天国→鸦片战争→洋务运动→戊戌变法', '鸦片战争→洋务运动→太平天国→戊戌变法', '鸦片战争→太平天国→戊戌变法→洋务运动'], correctIndex: 0, explanation: '正确顺序：鸦片战争（1840）→太平天国（1851）→洋务运动（1860s）→戊戌变法（1898）。', category: '历史事件', dynasty: '近代', difficulty: 2, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_060', question: '中国共产党的初心和使命是？', options: ['实现共产主义', '为中国人民谋幸福，为中华民族谋复兴', '建设社会主义现代化强国', '实现中华民族伟大复兴的中国梦'], correctIndex: 1, explanation: '中国共产党的初心和使命是为中国人民谋幸福，为中华民族谋复兴。', category: '三支政策', dynasty: '当代', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_061', question: '下列属于"初唐四杰"的是？', options: ['王勃、杨炯、卢照邻、骆宾王', '王勃、杨炯、陈子昂、骆宾王', '王勃、卢照邻、贺知章、骆宾王', '杨炯、卢照邻、骆宾王、张若虚'], correctIndex: 0, explanation: '初唐四杰是王勃、杨炯、卢照邻、骆宾王，他们反对齐梁绮靡文风，开创了唐代文学新局面。', category: '文学', dynasty: '唐朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_062', question: '被鲁迅称为"史家之绝唱，无韵之离骚"的是？', options: ['《汉书》', '《资治通鉴》', '《史记》', '《春秋》'], correctIndex: 2, explanation: '鲁迅高度评价《史记》为"史家之绝唱，无韵之离骚"，既肯定其史学价值也肯定其文学成就。', category: '文学', dynasty: '汉朝', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_063', question: '抗日战争中，中国军队取得的首次大捷是？', options: ['台儿庄大捷', '平型关大捷', '百团大战', '淞沪会战'], correctIndex: 1, explanation: '平型关大捷（1937年9月）是全面抗战以来中国军队取得的首次胜利，打破了日军不可战胜的神话。', category: '历史事件', dynasty: '近代', difficulty: 2, examFrequency: 'medium', isHebeiRelated: true, examType: 'single' },
  { id: 'q_064', question: '平津战役中，人民解放军和平解放的城市是？', options: ['天津', '北京（北平）', '张家口', '保定'], correctIndex: 1, explanation: '平津战役中，通过谈判和平解放了北平（今北京），使古都文物得以完整保存。平津战役是三大战役之一。', category: '历史事件', dynasty: '近代', difficulty: 2, examFrequency: 'medium', isHebeiRelated: true, examType: 'single' },
  { id: 'q_065', question: '下列哪项不是河北的世界文化遗产？', options: ['承德避暑山庄', '长城（河北段）', '清东陵和清西陵', '云冈石窟'], correctIndex: 3, explanation: '云冈石窟位于山西大同，不是河北的。承德避暑山庄、长城河北段、清东陵（唐山）和清西陵（保定）都是河北的世界文化遗产。', category: '河北特色', dynasty: '各时期', difficulty: 2, examFrequency: 'medium', isHebeiRelated: true, examType: 'single' },
  { id: 'q_066', question: '提出"实事求是"思想路线的党的会议是？', options: ['中共七大', '十一届三中全会', '遵义会议', '延安整风运动'], correctIndex: 1, explanation: '1978年十一届三中全会重新确立了实事求是的思想路线，开启了改革开放新时期。', category: '三支政策', dynasty: '当代', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_067', question: '中国古代"四大发明"中，哪一项是北宋发明的？', options: ['造纸术', '活字印刷术', '火药', '指南针'], correctIndex: 1, explanation: '活字印刷术是北宋毕昇发明的，其他三项出现更早：造纸术东汉、火药唐代、指南针战国时期已有雏形。', category: '文化', dynasty: '宋朝', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_068', question: '下列关于"三支一扶"政策说法错误的是？', options: ['服务期一般为2年', '期满后考研可加分', '服务期间不能辞职', '部分地区可转为事业编'], correctIndex: 2, explanation: '"三支一扶"服务期间可以辞职，但可能会影响相关优惠政策享受。其他三项说法正确。', category: '三支政策', dynasty: '当代', difficulty: 2, examFrequency: 'high', isHebeiRelated: true, examType: 'single' },
  { id: 'q_069', question: '河北的"全国爱国主义教育示范基地"不包括？', options: ['西柏坡', '李大钊纪念馆', '冉庄地道战遗址', '井冈山革命博物馆'], correctIndex: 3, explanation: '井冈山革命博物馆位于江西，不是河北的。西柏坡、李大钊纪念馆（乐亭）、冉庄地道战遗址（清苑）都是河北的爱国主义教育基地。', category: '河北特色', dynasty: '近代', difficulty: 2, examFrequency: 'medium', isHebeiRelated: true, examType: 'single' },
  { id: 'q_070', question: '"扶贫"在乡村振兴阶段已改为？', options: ['脱贫攻坚', '帮扶乡村振兴', '农村现代化建设', '精准扶贫'], correctIndex: 1, explanation: '脱贫攻坚战胜利后，三支一扶中的"扶贫"已改为"帮扶乡村振兴"，体现工作重心从脱贫攻坚转向乡村振兴。', category: '三支政策', dynasty: '当代', difficulty: 2, examFrequency: 'high', isHebeiRelated: true, examType: 'single' },
  { id: 'q_071', question: '隋朝大运河的起止点分别是？', options: ['西安到杭州', '洛阳到杭州', '北京到杭州', '洛阳到扬州'], correctIndex: 2, explanation: '隋朝大运河北起涿郡（今北京），南至余杭（今杭州），以洛阳为中心，全长2000多公里。', category: '历史事件', dynasty: '隋朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_072', question: '《天朝田亩制度》是哪个政权颁布的？', options: ['明末农民政权', '太平天国', '中华民国临时政府', '清朝政府'], correctIndex: 1, explanation: '《天朝田亩制度》是太平天国1853年颁布的土地纲领，主张"有田同耕，有饭同食"。', category: '历史事件', dynasty: '近代', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_073', question: '"两个务必"是在哪次会议上提出的？', options: ['中共七大', '七届二中全会', '七届三中全会', '中共八大'], correctIndex: 1, explanation: '1949年在西柏坡召开的七届二中全会上，毛泽东提出"两个务必"。西柏坡位于河北平山县。', category: '河北特色', dynasty: '近代', difficulty: 2, examFrequency: 'high', isHebeiRelated: true, examType: 'single' },
  { id: 'q_074', question: '下列不属于莎士比亚四大悲剧的是？', options: ['《哈姆雷特》', '《奥赛罗》', '《威尼斯商人》', '《麦克白》'], correctIndex: 2, explanation: '莎士比亚四大悲剧是《哈姆雷特》《奥赛罗》《李尔王》《麦克白》。《威尼斯商人》是喜剧。', category: '世界历史', dynasty: '各时期', difficulty: 2, examFrequency: 'low', isHebeiRelated: false, examType: 'single' },
  { id: 'q_075', question: '"精准扶贫"理念最早是在哪一年提出的？', options: ['2011年', '2013年', '2015年', '2017年'], correctIndex: 1, explanation: '2013年11月，习近平总书记在湖南湘西考察时首次提出"精准扶贫"重要理念。', category: '三支政策', dynasty: '当代', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_076', question: '下列哪组全是婉约派词人？', options: ['苏轼、辛弃疾', '柳永、李清照', '苏轼、柳永', '辛弃疾、李清照'], correctIndex: 1, explanation: '婉约派以柳永、李清照、晏殊、周邦彦为代表，词风婉转含蓄。苏轼、辛弃疾是豪放派代表。', category: '文学', dynasty: '宋朝', difficulty: 2, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_077', question: '以下哪位河北籍人物是中国共产党主要创始人之一？', options: ['毛泽东', '李大钊', '周恩来', '朱德'], correctIndex: 1, explanation: '李大钊（河北乐亭人）是中国最早的马克思主义者，中国共产党主要创始人之一。', category: '河北特色', dynasty: '近代', difficulty: 1, examFrequency: 'high', isHebeiRelated: true, examType: 'single' },
  { id: 'q_078', question: '王实甫的代表作是？', options: ['《窦娥冤》', '《西厢记》', '《汉宫秋》', '《墙头马上》'], correctIndex: 1, explanation: '王实甫是元代著名戏曲家，代表作《西厢记》描写张生和崔莺莺的爱情故事，被誉为"天下夺魁"。', category: '文学', dynasty: '元朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_079', question: '五四运动后期，运动中心从北京转移到？', options: ['上海', '广州', '南京', '武汉'], correctIndex: 0, explanation: '1919年6月，五四运动中心从北京转移到上海，运动主力从学生变为工人（六三运动）。', category: '历史事件', dynasty: '近代', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_080', question: '三支一扶人员服务期满后，在公务员考试中有什么优惠政策？', options: ['直接录用', '定向招录', '免笔试', '加10分'], correctIndex: 1, explanation: '三支一扶服务期满且考核合格的人员，可参加公务员定向招录，即专门面向基层服务项目人员的职位。', category: '三支政策', dynasty: '当代', difficulty: 2, examFrequency: 'high', isHebeiRelated: true, examType: 'single' },
  // ===== 新增题目 =====
  // --- 先秦更多 ---
  { id: 'q_081', question: '与"退避三舍"相关的历史人物是？', options: ['齐桓公', '晋文公', '楚庄王', '秦穆公'], correctIndex: 1, explanation: '晋文公重耳流亡时曾答应楚王若两国交战将退避三舍，后与楚国在城濮之战中履行承诺。', category: '历史事件', dynasty: '先秦', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_082', question: '"百家争鸣"中，主张"兼爱""非攻"的学派是？', options: ['儒家', '道家', '墨家', '法家'], correctIndex: 2, explanation: '墨家创始人墨子主张"兼爱"（无差别之爱）和"非攻"（反对不义战争）。', category: '哲学', dynasty: '先秦', difficulty: 1, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_083', question: '"战国七雄"中，位于今天河北境内的有？', options: ['齐和楚', '燕和赵', '韩和魏', '秦和楚'], correctIndex: 1, explanation: '战国七雄中，燕国（今河北北部）和赵国（今河北南部）位于河北地区。', category: '河北特色', dynasty: '先秦', difficulty: 2, examFrequency: 'medium', isHebeiRelated: true, examType: 'single' },
  { id: 'q_084', question: '《诗经》中"风"是指？', options: ['宫廷乐歌', '宗庙祭祀乐歌', '各地民歌', '史诗'], correctIndex: 2, explanation: '"风"是各地民歌，共160篇，是《诗经》中最具思想艺术价值的部分。', category: '文学', dynasty: '先秦', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_085', question: '"己所不欲，勿施于人"出自？', options: ['《老子》', '《庄子》', '《论语》', '《孟子》'], correctIndex: 2, explanation: '这句话出自《论语·颜渊》，是孔子提出的重要道德准则。', category: '哲学', dynasty: '先秦', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  // --- 秦汉更多 ---
  { id: 'q_086', question: '秦朝在地方实行的行政制度是？', options: ['分封制', '郡县制', '行省制', '三公九卿制'], correctIndex: 1, explanation: '秦始皇废除分封制，在全国推行郡县制，加强了中央集权。', category: '历史事件', dynasty: '秦朝', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_087', question: '"文景之治"是指哪两位皇帝？', options: ['汉高祖和汉武帝', '汉文帝和汉景帝', '汉武昭帝和汉宣帝', '汉光武帝和汉明帝'], correctIndex: 1, explanation: '文景之治指汉文帝刘恒和汉景帝刘启在位时期，推行休养生息政策出现的盛世。', category: '历史事件', dynasty: '汉朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_088', question: '提出"罢黜百家，独尊儒术"的是？', options: ['孔子', '董仲舒', '司马迁', '班固'], correctIndex: 1, explanation: '董仲舒向汉武帝建议"罢黜百家，独尊儒术"，使儒家思想成为官方正统。', category: '哲学', dynasty: '汉朝', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_089', question: '东汉张衡的发明是？', options: ['造纸术', '地动仪', '司南', '浑天仪'], correctIndex: 1, explanation: '张衡是东汉著名科学家，发明了世界上第一台地动仪，比欧洲早1700多年。', category: '文化', dynasty: '汉朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_090', question: '《汉书》的作者是？', options: ['司马迁', '班固', '范晔', '陈寿'], correctIndex: 1, explanation: '《汉书》是东汉班固所著的中国第一部纪传体断代史。', category: '文学', dynasty: '汉朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  // --- 三国两晋南北朝更多 ---
  { id: 'q_091', question: '官渡之战的交战双方是？', options: ['曹操vs刘备', '曹操vs袁绍', '孙权vs曹操', '刘备vs孙权'], correctIndex: 1, explanation: '200年官渡之战，曹操以少胜多击败袁绍，奠定了统一北方的基础。', category: '历史事件', dynasty: '三国', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_092', question: '北魏孝文帝改革的核心是？', options: ['军事改革', '汉化改革', '政治改革', '经济改革'], correctIndex: 1, explanation: '孝文帝推行汉化改革：迁都洛阳、改汉姓、穿汉服、说汉语，促进民族融合。', category: '历史事件', dynasty: '两晋南北朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_093', question: '被称为"天下第一行书"的是？', options: ['《祭侄文稿》', '《兰亭序》', '《寒食帖》', '《伯远帖》'], correctIndex: 1, explanation: '王羲之的《兰亭序》被誉为"天下第一行书"，是书法艺术的巅峰之作。', category: '文化', dynasty: '两晋南北朝', difficulty: 1, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  // --- 隋唐更多 ---
  { id: 'q_094', question: '隋朝创立的重要制度是？', options: ['察举制', '科举制', '征辟制', '世卿世禄制'], correctIndex: 1, explanation: '隋文帝创立科举制，隋炀帝设进士科，这是中国选官制度的重大变革。', category: '文化', dynasty: '隋唐', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_095', question: '隋朝大运河以哪个城市为中心？', options: ['长安', '洛阳', '建康', '开封'], correctIndex: 1, explanation: '隋朝大运河以洛阳为中心，北达涿郡（北京），南至余杭（杭州）。', category: '历史事件', dynasty: '隋朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_096', question: '唐朝三省六部制中，负责执行的是？', options: ['中书省', '门下省', '尚书省', '内阁'], correctIndex: 2, explanation: '三省中，中书省决策、门下省审议、尚书省执行。尚书省下设六部。', category: '文化', dynasty: '唐朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },
  { id: 'q_097', question: '被誉为"诗佛"的唐代诗人是？', options: ['李白', '杜甫', '王维', '孟浩然'], correctIndex: 2, explanation: '王维的诗歌充满禅意和山水田园之美，被称为"诗佛"。', category: '文学', dynasty: '唐朝', difficulty: 1, examFrequency: 'high', isHebeiRelated: false, examType: 'single' },
  { id: 'q_098', question: '安史之乱的爆发地范阳位于今天的？', options: ['陕西西安', '河南洛阳', '北京地区', '江苏南京'], correctIndex: 2, explanation: '安禄山以范阳（今北京地区）为基地发动叛乱。范阳位于今天的河北地区。', category: '历史事件', dynasty: '唐朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: true, examType: 'single' },
  { id: 'q_099', question: '"初唐四杰"包括王勃、杨炯、卢照邻和？', options: ['陈子昂', '骆宾王', '张若虚', '贺知章'], correctIndex: 1, explanation: '初唐四杰是王勃、杨炯、卢照邻、骆宾王。', category: '文学', dynasty: '唐朝', difficulty: 2, examFrequency: 'medium', isHebeiRelated: false, examType: 'single' },

  db(a,b) { return Math.floor((new Date(b)-new Date(a))/864e5); },
  td() { return new Date().toISOString().slice(0,10); }
};

// ======================== SM-2 ========================
function sm2(q, ef, iv, rp) {
  if (q < 3) { rp = 0; iv = 1; } else { if (rp === 0) iv = 1; else if (rp === 1) iv = 6; else iv = Math.round(iv * ef); rp++; }
  ef = Math.max(1.3, ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
  return { iv, ef, rp, nx: Date.now() + iv * 864e5 };
}

  });
  quizQuestions.forEach(q => c.push({ id: `fc_q_${q.id}`, f: q.question, b: `正确答案：${String.fromCharCode(65+q.correctIndex)}. ${q.options[q.correctIndex]}\n\n解析：${q.explanation}`, cat: q.category, h: `难度${q.difficulty}星`, sid: q.id, hb: q.isHebeiRelated }));
  return c;
}

const qsa = (s,c) => Array.from((c||document).querySelectorAll(s));
const ri = h => { $('app').innerHTML = h; };

// ======================== 导航 ========================
function nav(pg, p) {
  S.page = pg; history.pushState(null, '', '#' + pg);
  qsa('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === pg));
  rcp(p);
}
function rcp(p) {
  if (S.page === 'timeline') rt(p);
  else if (S.page === 'quiz') rq(p);
  else if (S.page === 'flashcards') rf(p);
  else if (S.page === 'dashboard') rd(p);
}
window.addEventListener('hashchange', () => {
  const pg = location.hash.slice(1) || 'timeline';
  if (['timeline','quiz','flashcards','dashboard'].includes(pg)) {
    S.page = pg; qsa('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === pg)); rcp();
  }
});
function uhs() {
  const a = $('accuracyDisplay');
  const r = S.st.tq > 0 ? Math.round(S.st.cr/S.st.tq*100) : null;
  if (a) a.textContent = r !== null ? `🎯 正确率 ${r}%` : '🎯 开始答题吧';
  const s = $('streakDisplay');
  if (s) s.textContent = `🔥 连续学习 ${S.st.sk||0} 天`;
}
function usk() {
  const t = U.td();
  if (S.st.ld === t) return;
  if (S.st.ld) S.st.sk = U.db(S.st.ld, t) === 1 ? (S.st.sk||0)+1 : 1;
  else S.st.sk = 1;
  S.st.ld = t; sv(); uhs();
}

// ======================== 时间轴（三标式） ========================
function rt(p) {
  const isHB = id => knowledgePoints.some(kp => kp.dynasty === dynasties.find(d=>d.id===id)?.name && kp.isHebeiRelated);
  const targetId = p?.dynasty || S.tl.sel;

  let h = `<div class="fade-in tl-axis">`;

  // === 外层：朝代标尺（顶部水平滚动标签） ===
  h += `<div class="tl-dynasty-bar" id="tlBar">`;
  dynasties.forEach(d => {
    const hb = isHB(d.id);
    const act = d.id === targetId;
    h += `<div class="tl-dynasty-tag ${act?'active':''} ${hb?'hebei':''}" onclick="S.tl.sel='${d.id}';rt()" data-id="${d.id}">${d.name}</div>`;
  });
  h += `</div>`;

  // === 中层+内层：一条完整的事件时间线 ===
  h += `<div class="tl-event-list">`;
  dynasties.forEach(d => {
    const active = d.id === targetId;
    // 展开还是收起？只展开目标朝代，其余折叠
    const open = d.id === targetId;
    h += `<div class="tl-event-group" data-id="${d.id}">`;
    // 朝代分组标题（点击跳转）
    h += `<div class="tl-event-group-header" onclick="S.tl.sel='${d.id}';rt()">
      <span class="tl-eg-dynasty">${d.name}</span>
      <span class="tl-eg-years">${U.fy(d.startYear)} ~ ${U.fy(d.endYear)}</span>
      ${d.capital?`<span class="tl-eg-badge">🏛️${d.capital}</span>`:''}
      ${isHB(d.id)?'<span class="text-hebei" style="font-size:0.6rem;">🔴河北</span>':''}
      <span style="margin-left:auto;font-size:0.7rem;color:var(--text-muted);">${d.keyEvents?.length||0}件大事 ${open?'▲':'▼'}</span>
    </div>`;
    // 事件列表（只有目标朝代展开）
    if (open && d.keyEvents?.length) {
      d.keyEvents.forEach(e => {
        const hasHebei = e.significance && (e.significance.includes('河北') || e.details?.includes('河北'));
        h += `<div class="tl-event ${hasHebei?'hebei':''}" onclick="this.classList.toggle('open')">
          <span class="tl-event-year">${U.fy(e.year)}</span>
          <div class="tl-event-title">${e.event}</div>
          <div class="tl-event-summary">${e.significance ? e.significance.slice(0,50)+(e.significance.length>50?'...':'') : '点击查看详情 →'}</div>
          <div class="tl-event-detail">
            ${e.details ? `<div style="margin-bottom:4px;">📖 ${e.details}</div>` : ''}
            ${e.significance ? `<div class="tl-event-significance">🎯 意义：${e.significance}</div>` : ''}
          </div>
        </div>`;
      });
      // 刷题快捷
      let qs = quizQuestions.filter(q => q.dynasty === d.name);
      if (qs.length) h += `<div style="margin:8px 0 16px 12px;"><button onclick="startQz('${d.name}')" class="px-3 py-1.5 rounded-lg text-xs text-white" style="background:var(--accent);">✍️ 刷${d.name}题目（${qs.length}题）</button></div>`;
    }
    h += `</div>`;
  });
  h += `</div></div>`;

  ri(h);
  // 滚动目标标签到视野
  setTimeout(() => {
    const el = document.querySelector(`.tl-dynasty-tag[data-id="${targetId}"]`);
    if (el) el.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  }, 50);
}

// ======================== 刷题 ========================
function rq(p) {
  if (S.qz.res) { rqRes(); return; }
  if (S.qz.qs.length && S.qz.idx < S.qz.qs.length) { rqQ(); return; }
  let h = `<div class="fade-in max-w-2xl mx-auto"><div class="card p-6 mb-4">
    <h2 class="text-lg font-bold mb-4">✍️ 刷题设置</h2>
    <div class="space-y-4">
      <div><label class="text-sm" style="color:var(--text-secondary);">类别</label>
        <select id="qc" class="w-full px-3 py-2 rounded-lg border mt-1 text-sm" style="background:var(--bg-card);border-color:var(--border);color:var(--text-primary);">
          <option value="all">全部</option><option value="文学">📖文学</option><option value="历史事件">🏛️历史</option><option value="哲学">💭哲学</option><option value="人物">👤人物</option><option value="文化">🎭文化</option><option value="河北特色">🔴河北</option><option value="三支政策">📋三支</option>
        </select>
      </div>
      <div><label class="text-sm" style="color:var(--text-secondary);">数量</label>
        <select id="qn" class="w-full px-3 py-2 rounded-lg border mt-1 text-sm" style="background:var(--bg-card);border-color:var(--border);color:var(--text-primary);">
          <option value="5">5题</option><option value="10" selected>10题</option><option value="20">20题</option><option value="all">全部</option>
        </select>
      </div>
      <label class="flex items-center gap-2 text-sm" style="color:var(--text-secondary);"><input type="checkbox" id="qh" style="accent-color:var(--accent);">🔴仅河北特色</label>
      <div class="flex gap-3">
        <button onclick="startQz()" class="flex-1 px-4 py-2.5 rounded-lg text-sm font-medium text-white" style="background:var(--accent);">🚀开始答题</button>
        <button onclick="startWQ()" class="px-4 py-2.5 rounded-lg text-sm text-white" style="background:var(--wrong);">❌错题重练</button>
      </div>
    </div></div>`;
  if (S.st.tq > 0) h += `<div class="card p-4 text-sm" style="color:var(--text-secondary);">已答题 <b>${S.st.tq}</b>，正确率 <b style="color:var(--correct);">${Math.round(S.st.cr/S.st.tq*100)}%</b></div>`;
  h += `</div>`; ri(h);
}

function startQz(dy) {
  let p = [...quizQuestions];
  if (dy) p = p.filter(q => q.dynasty === dy);
  else {
    const c = $('qc')?.value || 'all'; const hb = $('qh')?.checked || false;
    if (c !== 'all') p = p.filter(q => q.category === c);
    if (hb) p = p.filter(q => q.isHebeiRelated);
  }
  if (!p.length) { alert('无符合条件的题目'); return; }
  const n = dy ? 50 : ($('qn')?.value||'10');
  const cnt = n === 'all' ? p.length : Math.min(+n, p.length);
  S.qz.qs = U.sh(p).slice(0, cnt); S.qz.idx = 0; S.qz.ans = []; S.qz.res = false; rqQ();
}

function startWQ() {
  if (!S.h.length) { alert('还没有错题记录'); return; }
  const ids = new Set(S.h.filter(a => !a.c).map(a => a.id));
  const w = quizQuestions.filter(q => ids.has(q.id));
  if (!w.length) { alert('没有错题！🎉'); return; }
  S.qz.qs = U.sh(w); S.qz.idx = 0; S.qz.ans = []; S.qz.res = false; rqQ();
}

function rqQ() {
  const q = S.qz.qs[S.qz.idx];
  if (!q) { rqRes(); return; }
  const ans = S.qz.ans[S.qz.idx] !== undefined;
  const sel = S.qz.ans[S.qz.idx];
  const lb = ['A','B','C','D','E','F'];
  let h = `<div class="fade-in max-w-2xl mx-auto"><div class="card p-5">
    <div class="flex items-center justify-between mb-3"><span class="text-sm" style="color:var(--text-secondary);">第 ${S.qz.idx+1}/${S.qz.qs.length} 题</span>
      <span class="badge text-xs" style="background:${U.cc(q.category)}20;color:${U.cc(q.category)};">${U.ci(q.category)} ${q.category}</span></div>
    <div class="progress-bar mb-4"><div class="progress-bar-fill" style="width:${(S.qz.idx+1)/S.qz.qs.length*100}%"></div></div>
    <div class="text-base font-medium mb-4 leading-relaxed">${q.question}</div>`;
  q.options.forEach((o,i) => {
    let cls = 'quiz-option';
    if (ans) { cls += i === q.correctIndex ? ' correct' : (i === sel ? ' wrong' : ''); }
    else if (i === sel) cls += ' selected';
    h += `<button class="${cls}" ${ans?'disabled':''} onclick="selA(${i})"><span class="font-bold mr-2">${lb[i]}.</span>${o}</button>`;
  });
  if (!ans) {
    h += `<button onclick="confA()" id="cb" class="w-full mt-4 px-4 py-2.5 rounded-lg text-sm font-medium text-white ${sel===undefined?'op-50':''}" style="background:var(--accent);" ${sel===undefined?'disabled':''}>确认答案</button>`;
  }
  if (ans) {
    const ok = sel === q.correctIndex;
    h += `<div class="mt-4 p-4 rounded-lg" style="background:${ok?'var(--correct)15':'var(--wrong)15'};">
      <div class="text-sm font-bold mb-1" style="color:${ok?'var(--correct)':'var(--wrong)'};">${ok?'✅正确！':'❌错误'}</div>
      <div class="text-sm mb-2" style="color:var(--text-secondary);">✅<b>${lb[q.correctIndex]}. ${q.options[q.correctIndex]}</b></div>
      <div class="text-sm leading-relaxed" style="color:var(--text-secondary);">📖${q.explanation}</div></div>`;
    h += S.qz.idx < S.qz.qs.length-1
      ? `<button onclick="nxtQ()" class="w-full mt-4 px-4 py-2.5 rounded-lg text-sm font-medium text-white" style="background:var(--accent);">➡️下一题</button>`
      : `<button onclick="finQ()" class="w-full mt-4 px-4 py-2.5 rounded-lg text-sm font-medium text-white" style="background:var(--gold);">📊查看结果</button>`;
  }
  h += `</div></div>`; ri(h);
}

function selA(i) { if (S.qz.ans[S.qz.idx] === undefined) { S.qz.ans[S.qz.idx] = i; rqQ(); } }
function confA() {
  const i = S.qz.ans[S.qz.idx];
  if (i === undefined) return;
  const q = S.qz.qs[S.qz.idx];
  const ok = i === q.correctIndex;
  S.st.tq++; if (ok) S.st.cr++;
  S.h.push({id:q.id, s:i, c:ok, t:new Date().toISOString()});
  if (S.h.length > 500) S.h.splice(0, S.h.length-500);
  sv(); uhs(); rqQ();
}
function nxtQ() { if (S.qz.idx < S.qz.qs.length-1) { S.qz.idx++; rqQ(); } }
function finQ() { S.qz.res = true; rqRes(); }

function rqRes() {
  if (!S.qz.qs.length) { S.qz.res = false; rq(); return; }
  const cor = S.qz.ans.filter((a,i) => a!==undefined && a===S.qz.qs[i].correctIndex).length;
  const rate = Math.round(cor/S.qz.qs.length*100);
  const cs = {};
  S.qz.qs.forEach((q,i) => {
    if (!cs[q.category]) cs[q.category] = {t:0,c:0};
    cs[q.category].t++; if (S.qz.ans[i]!==undefined && S.qz.ans[i]===q.correctIndex) cs[q.category].c++;
  });
  const wr = S.qz.qs.filter((q,i) => S.qz.ans[i]!==undefined && S.qz.ans[i]!==q.correctIndex);
  const lb = ['A','B','C','D'];
  let h = `<div class="fade-in max-w-2xl mx-auto">
    <div class="card p-6 text-center mb-4"><div class="text-3xl mb-2">${rate>=80?'🎉':rate>=60?'💪':'📚'}</div>
      <div class="text-2xl font-bold" style="color:${rate>=80?'var(--correct)':rate>=60?'var(--gold)':'var(--wrong)'};">${cor}/${S.qz.qs.length}</div>
      <div class="text-lg" style="color:var(--text-secondary);">正确率 ${rate}%</div></div>
    <div class="card p-4 mb-4"><div class="text-sm font-bold mb-3">📊分类统计</div>`;
  Object.entries(cs).forEach(([cat,st]) => {
    const pct = st.t > 0 ? Math.round(st.c/st.t*100) : 0;
    h += `<div class="flex items-center gap-3 mb-2"><span class="text-xs w-16" style="color:var(--text-muted);">${U.ci(cat)}${cat}</span>
      <div class="progress-bar flex-1"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <span class="text-xs" style="color:var(--text-secondary);">${st.c}/${st.t}</span></div>`;
  });
  h += `</div>`;
  if (wr.length) {
    h += `<div class="card p-4 mb-4"><div class="text-sm font-bold mb-3">📝错题回顾</div>`;
    wr.forEach((q,i) => {
      const idx = S.qz.qs.indexOf(q);
      h += `<div class="text-xs mb-3 pb-3" style="border-bottom:1px solid var(--border);"><div class="font-medium">${i+1}.${q.question}</div>
        <div style="color:var(--wrong);">❌你选了：${lb[S.qz.ans[idx]]}</div>
        <div style="color:var(--correct);">✅${lb[q.correctIndex]}.${q.options[q.correctIndex]}</div></div>`;
    });
    h += `</div>`;
  }
  h += `<div class="flex gap-3">
    <button onclick="S.qz.res=false;S.qz.qs=[];rq()" class="flex-1 px-4 py-2.5 rounded-lg text-sm" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);">返回</button>
    <button onclick="retWQ()" class="flex-1 px-4 py-2.5 rounded-lg text-sm text-white" style="background:var(--accent);">🔁错题重练</button>
  </div></div>`;
  ri(h); usk();
}
function retWQ() {
  const w = S.qz.qs.filter((q,i) => S.qz.ans[i]!==undefined && S.qz.ans[i]!==q.correctIndex);
  if (!w.length) { alert('没有错题！'); return; }
  S.qz.qs = w; S.qz.idx = 0; S.qz.ans = []; S.qz.res = false; rqQ();
}

// ======================== 闪卡 ========================
function rf(p) {
  if (!S.fc.cs.length) { S.fc.cs = genFC(); S.fc.idx = 0; S.fc.flp = false; }
  const c = S.fc.cs[S.fc.idx];
  if (!c) { ri(`<div class="text-center py-10" style="color:var(--text-muted);">暂无闪卡</div>`); return; }
  const pr = S.fp[c.id] || {lv:0,tr:0,ef:2.5,iv:0,rp:0};
  let h = `<div class="fade-in max-w-lg mx-auto"><div class="flex gap-2 mb-4">
    <select id="fcc" class="flex-1 px-3 py-1.5 rounded-lg border text-sm" style="background:var(--bg-card);border-color:var(--border);color:var(--text-primary);" onchange="filFC()">
      <option value="all">全部</option><option value="文学">📖文学</option><option value="历史事件">🏛️历史</option><option value="哲学">💭哲学</option><option value="文化">🎭文化</option><option value="河北特色">🔴河北</option><option value="三支政策">📋三支</option>
    </select>
    <select id="fcm" class="px-3 py-1.5 rounded-lg border text-sm" style="background:var(--bg-card);border-color:var(--border);color:var(--text-primary);" onchange="filFC()">
      <option value="all">全部</option>
      <option value="0">未学</option><option value="1">🌟初学</option><option value="2">🌟🌟学习中</option><option value="3">🌟🌟🌟基本</option><option value="4">🌟🌟🌟🌟熟练</option><option value="5">🌟🌟🌟🌟🌟精通</option>
    </select></div>`;
  const l = Object.values(S.fp).filter(p => p.lv >= 3).length;
  h += `<div class="text-xs mb-3 flex justify-between" style="color:var(--text-muted);"><span>🃏${S.fc.cs.length}张·掌握${l}张</span><span>${S.fc.idx+1}/${S.fc.cs.length}</span></div>`;
  h += `<div class="flashcard-container mb-4" onclick="flpFC()"><div class="flashcard-inner ${S.fc.flp?'flipped':''}">

      <div class="text-lg font-medium text-center leading-relaxed">${c.f}</div>
      ${c.h?`<div class="mt-3 text-xs" style="color:var(--text-muted);">💡${c.h}</div>`:''}
      <div class="mt-auto text-xs" style="color:var(--text-muted);">👆点击翻转</div>
      ${c.hb?'<div class="mt-1 badge badge-hebei text-xs">🔴河北特色</div>':''}
    </div>
    <div class="flashcard-back"><div class="text-xs mb-2" style="color:var(--text-muted);">📖答案</div>
      <div class="text-base text-center leading-relaxed whitespace-pre-line">${c.b}</div>
    </div></div></div>`;
  if (S.fc.flp) {
    h += `<div class="mb-4"><div class="text-xs text-center mb-2" style="color:var(--text-muted);">掌握程度：</div><div class="flex gap-1 justify-center">`;
    [[1,'生疏','var(--wrong)'],[2,'较难','#D97706'],[3,'一般','var(--gold)'],[4,'简单','#10B981'],[5,'熟练','var(--correct)']].forEach(([lv,lb,col]) => {
      const a = pr.lv === lv;
      h += `<button onclick="rtFC(${lv})" class="px-3 py-1.5 rounded-lg text-xs font-medium" style="background:${a?col:'var(--bg-card)'};color:${a?'white':col};border:1px solid ${col};">${'🌟'.repeat(lv)}${lb}</button>`;
    });
    h += `</div></div>`;
  }
  h += `<div class="flex gap-3">
    <button onclick="prvFC()" class="flex-1 px-4 py-2 rounded-lg text-sm" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);" ${S.fc.idx===0?'disabled style="opacity:0.4"':''}>⬅️上一张</button>
    <button onclick="nxtFC()" class="flex-1 px-4 py-2 rounded-lg text-sm text-white" style="background:var(--accent);">➡️下一张</button>
  </div></div>`;
  ri(h);
  if ($('fcc')) $('fcc').value = S.fc.cat;
  if ($('fcm')) $('fcm').value = S.fc.mas;
}
function flpFC() { S.fc.flp = !S.fc.flp; rf(); }
function rtFC(lv) {
  const c = S.fc.cs[S.fc.idx];
  const p = S.fp[c.id] || {lv:0,tr:0,ef:2.5,iv:0,rp:0};
  const r = sm2(lv, p.ef, p.iv, p.rp);
  S.fp[c.id] = {lv, tr:(p.tr||0)+1, lr:new Date().toISOString(), nx:r.nx, ef:r.ef, iv:r.iv, rp:r.rp};
  S.st.fr = (S.st.fr||0) + 1; sv();
  setTimeout(() => nxtFC(), 300);
}
function nxtFC() { if (S.fc.idx < S.fc.cs.length-1) { S.fc.idx++; S.fc.flp = false; rf(); } }
function prvFC() { if (S.fc.idx > 0) { S.fc.idx--; S.fc.flp = false; rf(); } }
function filFC() {
  const c = $('fcc').value; const m = $('fcm').value;
  S.fc.cat = c; S.fc.mas = m;
  let a = genFC();
  if (c !== 'all') a = a.filter(x => x.cat === c);
  if (m !== 'all') { const lv = +m; a = a.filter(x => { const p = S.fp[x.id]; return p ? p.lv === lv : lv === 0; }); }
  S.fc.cs = a; S.fc.idx = 0; S.fc.flp = false; rf();
}

// ======================== 总览 ========================
function rd(p) {
  const q = p?.q || S.sr.q || '';
  const st = S.st; const r = st.tq > 0 ? Math.round(st.cr/st.tq*100) : 0;
  const ft = Object.keys(S.fp).length;
  const fm = Object.values(S.fp).filter(p => p.lv >= 3).length;
  const fr = ft > 0 ? Math.round(fm/ft*100) : 0;
  const cd = {};
  S.h.forEach(h => { const q = quizQuestions.find(qq => qq.id === h.id); if (!q) return; if (!cd[q.category]) cd[q.category]={t:0,c:0}; cd[q.category].t++; if (h.c) cd[q.category].c++; });
  let h = `<div class="fade-in">
    <div class="card p-4 mb-4"><div class="flex gap-2">
      <input id="si" type="text" placeholder="🔍搜索知识点/题目/关键词..." value="${q}" class="flex-1 px-4 py-2.5 rounded-lg border text-sm" style="background:var(--bg-primary);border-color:var(--border);color:var(--text-primary);" onkeydown="if(event.key==='Enter')ds()">
      <button onclick="ds()" class="px-4 py-2.5 rounded-lg text-sm text-white" style="background:var(--accent);">搜索</button>
    </div></div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <div class="card p-3 text-center"><div class="text-2xl font-bold" style="color:var(--accent);">${st.tq||0}</div><div class="text-xs" style="color:var(--text-muted);">📝答题总数</div></div>
      <div class="card p-3 text-center"><div class="text-2xl font-bold" style="color:${r>=70?'var(--correct)':'var(--wrong)'};">${r}%</div><div class="text-xs" style="color:var(--text-muted);">🎯正确率</div></div>
      <div class="card p-3 text-center"><div class="text-2xl font-bold" style="color:var(--gold);">${fr}%</div><div class="text-xs" style="color:var(--text-muted);">🃏闪卡掌握率</div></div>
      <div class="card p-3 text-center"><div class="text-2xl font-bold" style="color:#F59E0B;">${st.sk||0}</div><div class="text-xs" style="color:var(--text-muted);">🔥连续学习</div></div>
    </div>`;
  if (Object.keys(cd).length) {
    h += `<div class="card p-4 mb-4"><div class="text-sm font-bold mb-3">📊分类掌握度</div>`;
    Object.entries(cd).forEach(([cat,d]) => {
      const pct = d.t > 0 ? Math.round(d.c/d.t*100) : 0;
      h += `<div class="flex items-center gap-3 mb-2"><span class="text-xs w-16" style="color:${U.cc(cat)};">${U.ci(cat)}${cat}</span>
        <div class="progress-bar flex-1"><div class="progress-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${U.cc(cat)},${U.cc(cat)}88);"></div></div>
        <span class="text-xs" style="color:var(--text-secondary);">${pct}%</span></div>`;
    });
    h += `</div>`;
  }
  h += `<div class="card p-4 mb-4"><div class="text-sm font-bold mb-3">🎯今日推荐</div>`;
  const now = Date.now();
  const due = Object.entries(S.fp).filter(([,p]) => p.nx && p.nx <= now).slice(0,3);
  if (due.length) { due.forEach(([id]) => { const card = genFC().find(c => c.id === id); if (card) h += `<div class="text-xs cursor-pointer mb-1 p-2 rounded clickable" style="background:var(--accent-light);" onclick="nav('flashcards')">🃏${card.f}<span style="color:var(--text-muted);">（${card.cat}）</span></div>`; }); }
  else h += `<div class="text-xs mb-2" style="color:var(--text-muted);">📅没有到期复习</div>`;
  const wc = Object.entries(cd).filter(([,d]) => d.t >= 3 && d.c/d.t < 0.6);
  if (wc.length) wc.forEach(([cat]) => h += `<div class="text-xs cursor-pointer mt-1 clickable" onclick="nav('quiz')" style="color:var(--accent);">→强化${U.ci(cat)}${cat}</div>`);
  h += `</div>`;
  if (q && q.trim()) {
    const kr = U.fs(knowledgePoints, q), qr = U.fs(quizQuestions, q);
    h += `<div class="card p-4 mb-4"><div class="text-sm font-bold mb-3">🔍结果：${kr.length+qr.length}条</div>`;
    if (kr.length) kr.forEach(kp => h += `<div class="text-xs mb-2 p-2 rounded clickable" style="background:var(--bg-secondary);" onclick="nav('timeline',{dynasty:'${kp.dynasty}'})"><span class="font-medium">${kp.title}</span><span class="badge text-xs" style="background:${U.cc(kp.category)}20;color:${U.cc(kp.category)};">${kp.category}</span><span class="block mt-1" style="color:var(--text-muted);">${kp.content.slice(0,80)}...</span></div>`);
    if (qr.length) qr.slice(0,5).forEach(r => h += `<div class="text-xs mb-1 p-2 rounded" style="background:var(--bg-secondary);">${r.question}</div>`);
    h += `</div>`;
  }
  h += `<div class="card p-4"><div class="text-sm font-bold mb-3">⚙️数据管理</div>
    <div class="flex gap-2 flex-wrap">
      <button onclick="expD()" class="px-3 py-1.5 rounded-lg text-xs" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);">📤导出数据</button>
      <label class="px-3 py-1.5 rounded-lg text-xs cursor-pointer" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);">📥导入数据<input type="file" accept=".json" onchange="impD(event)" style="display:none"></label>
      <button onclick="if(confirm('确定清除所有数据？')){clr()}" class="px-3 py-1.5 rounded-lg text-xs" style="background:var(--wrong)15;border:1px solid var(--wrong);color:var(--wrong);">🗑️重置</button>
    </div>
    <div class="text-xs mt-2" style="color:var(--text-muted);">📌数据存在本地，可导出JSON编辑后重新导入</div>
  </div></div>`;
  ri(h); S.sr.q = q; uhs();
}
function ds() { const q = $('si')?.value||''; S.sr.q = q; rd({q}); }
function expD() {
  const d = {v:1, ts:new Date().toISOString(), st:S.st, h:S.h, fp:S.fp, pr:S.pr};
  const b = new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `三支一扶_${U.td()}.json`; a.click();
}
function impD(e) {
  const f = e.target.files?.[0]; if (!f) return;
  new FileReader().onload = ev => { try { const d = JSON.parse(ev.target.result); if (d.st) Object.assign(S.st,d.st); if (d.h) S.h = d.h; if (d.fp) Object.assign(S.fp,d.fp); if (d.pr) Object.assign(S.pr,d.pr); sv(); nav('dashboard'); alert('✅导入成功！'); } catch { alert('❌格式错误'); } };
}
function clr() { Store.remove('h'); Store.remove('fp'); Store.remove('st'); Store.remove('pr'); location.reload(); }

// ======================== 暗色模式 ========================
function togD() {
  const d = document.documentElement.classList.toggle('dark');
  S.pr.dk = d; $('darkIcon').textContent = d ? '☀️' : '🌙'; sv();
}

// ======================== 触控滑动支持（移动端） ========================
let tx = 0, ty = 0;
document.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }
}, {passive:true});
document.addEventListener('touchend', e => {
  if (!tx) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  // 只触发水平滑动，且距离 > 50px，垂直偏移 < 30px
  if (absDx > 50 && absDy < absDx * 0.7) {
    const dir = dx > 0 ? 'left' : 'right'; // 右滑=上一项，左滑=下一项
    if (S.page === 'quiz' && !S.qz.res && S.qz.ans[S.qz.idx] !== undefined) {
      e.preventDefault();
      if (S.qz.idx < S.qz.qs.length - 1) { S.qz.idx++; rqQ(); }
    } else if (S.page === 'flashcards') {
      e.preventDefault();
      if (dir === 'right' && S.fc.idx > 0) { S.fc.idx--; S.fc.flp = false; rf(); }
      else if (dir === 'left' && S.fc.idx < S.fc.cs.length - 1) { S.fc.idx++; S.fc.flp = false; rf(); }
    }
  }
  tx = 0; ty = 0;
}, {passive:false});

// ======================== 键盘快捷键 ========================
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if (S.page === 'quiz' && !S.qz.res && e.key === 'ArrowRight' && S.qz.ans[S.qz.idx]!==undefined) { e.preventDefault(); nxtQ(); }
  if (S.page === 'flashcards') {
    if (e.key===' ' || e.key==='Enter') { e.preventDefault(); flpFC(); }
    if (e.key==='ArrowRight') { e.preventDefault(); nxtFC(); }
    if (e.key==='ArrowLeft') { e.preventDefault(); prvFC(); }
    if (e.key>='1' && e.key<='5' && S.fc.flp) { e.preventDefault(); rtFC(+e.key); }
  }
  if ((e.key==='d'||e.key==='D') && (e.ctrlKey||e.metaKey)) { e.preventDefault(); togD(); }
});

// ======================== 启动 ========================
document.addEventListener('DOMContentLoaded', () => {
  if (S.pr.dk) { document.documentElement.classList.add('dark'); $('darkIcon').textContent = '☀️'; }
  $('darkToggle').addEventListener('click', togD);
  document.addEventListener('click', e => { const b = e.target.closest('[data-tab]'); if (b) nav(b.dataset.tab); });
  const h = location.hash.slice(1);
  const pg = ['timeline','quiz','flashcards','dashboard'].includes(h) ? h : 'timeline';
  S.page = pg; qsa('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === pg));
  uhs(); rcp(); usk();
});
</script>
</body>
</html>
